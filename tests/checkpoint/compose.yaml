# Minimal glibc sandbox for the checkpoint e2e test. The default
# aisiuk/inspect-tool-support image has a ~955 MB /root (mostly .cache);
# auto-capturing $HOME there overflows the 100 MiB exec-output limit. This
# image's /root is ~empty, so the home-dir auto-backup stays small while
# still exercising the real backup/restore path. (restic is a static
# binary, so it runs here.)
services:
  default:
    image: debian:bookworm-slim
    command: "tail -f /dev/null"
    init: true
