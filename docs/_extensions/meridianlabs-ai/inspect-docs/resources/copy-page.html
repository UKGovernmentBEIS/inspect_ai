<div id="copy-page-btn" class="btn-group" style="display:none;">
  <button type="button" class="btn btn-sm btn-light" id="copy-page-action"
          title="Copy page as Markdown">
    <i class="bi bi-clipboard"></i> Copy page
  </button>
  <button type="button" class="btn btn-sm btn-light dropdown-toggle dropdown-toggle-split"
          data-bs-toggle="dropdown" aria-expanded="false">
    <span class="visually-hidden">Toggle Dropdown</span>
  </button>
  <ul class="dropdown-menu dropdown-menu-end">
    <li><a class="dropdown-item" href="#" id="copy-page-md">
      <i class="bi bi-clipboard"></i> Copy page as Markdown
    </a></li>
    <li><a class="dropdown-item" href="#" id="open-page-md">
      <i class="bi bi-box-arrow-up-right"></i> Open Markdown
    </a></li>
  </ul>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var mdUrl = window.location.pathname.replace(/\.html$/, ".html.md");
  var btn = document.getElementById("copy-page-btn");
  var cachedMarkdown = null;

  // Pre-fetch the .html.md content
  fetch(mdUrl)
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.text();
    })
    .then(function (text) {
      cachedMarkdown = text;

      // Relocate button into the .quarto-title div
      var titleDiv = document.querySelector(".quarto-title");
      if (titleDiv) {
        titleDiv.appendChild(btn);
        btn.style.display = "";
      }
    })
    .catch(function () {
      // No .html.md available — remove button entirely
      btn.remove();
    });

  function copyMarkdown(e) {
    e.preventDefault();
    if (!cachedMarkdown) return;
    navigator.clipboard.writeText(cachedMarkdown).then(function () {
      // Brief visual feedback — lock width to prevent layout shift
      var actionBtn = document.getElementById("copy-page-action");
      var original = actionBtn.innerHTML;
      actionBtn.style.minWidth = actionBtn.offsetWidth + "px";
      actionBtn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
      setTimeout(function () {
        actionBtn.innerHTML = original;
        actionBtn.style.minWidth = "";
      }, 1500);
    });
  }

  document.getElementById("copy-page-action").addEventListener("click", copyMarkdown);
  document.getElementById("copy-page-md").addEventListener("click", copyMarkdown);
  document.getElementById("open-page-md").addEventListener("click", function (e) {
    e.preventDefault();
    window.open(mdUrl, "_blank");
  });
});
</script>
