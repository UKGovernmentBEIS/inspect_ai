# Per-dataset overrides for harbor evals synced by sync_all.py / sync_harbor.py.
#
# Keyed by dataset `name` (unversioned, as it appears in the Harbor registry).
# Fields:
#   categories:   REQUIRED. Array of one or more of:
#                   Coding | Assistants | Cybersecurity | Safeguards |
#                   Mathematics | Reasoning | Knowledge | Science |
#                   Finance | Medicine | Law | Multimodal |
#                   Scheming | Bias | Behavior | Personality | Writing | Other
#   arxiv:        arxiv paper URL                             (optional)
#   repo:         canonical upstream GitHub repo              (optional, used as paper fallback)
#   tags:         list of strings                             (optional)
#   kind:         agent|qa|generation|multimodal              (optional, default agent)
#   modalities:   list                                        (optional)
#   contributors: list of GitHub usernames                    (optional)
#   title:        override the auto-derived display title     (optional)
#   featured:     boolean                                     (optional)

