name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

env:
  UV_VERSION: 0.9.4

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
      - name: Format with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  mypy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |-
          uv venv
          uv pip install .[dev]

      - name: Run mypy
        run: uv run mypy --exclude tests/test_package src tests

      - name: Minimize uv cache
        if: ${{ !cancelled() }}
        run: uv cache prune --ci

  pre-commit:
    runs-on: ubuntu-latest
    env:
      SKIP: "ruff"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "${{ env.UV_VERSION }}"

      - name: Install dependencies
        run: uv pip install --system .[dev]

      - uses: pre-commit/action@v3.0.1

      - name: Minimize uv cache
        if: ${{ !cancelled() }}
        run: uv cache prune --ci

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |-
          uv venv
          uv pip install .[dev]

      - name: Test with pytest
        run: uv run pytest -rA --doctest-modules --color=yes --cov=inspect_ai

      - name: Minimize uv cache
        if: ${{ !cancelled() }}
        run: uv cache prune --ci

  check-tool-paths:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tools_changed: ${{ steps.filter.outputs.tools }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tools:
              - "src/inspect_ai/tool/**"
              - "src/inspect_sandbox_tools/**"
              - "tests/tools/**"

  slow-tool-tests:
    needs: check-tool-paths
    if: needs.check-tool-paths.outputs.tools_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true

      - name: Create local main ref
        run: git branch main origin/main

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            network=host
          buildkitd-flags: |
            --allow-insecure-entitlement security.insecure
            --allow-insecure-entitlement network.host

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.11"

      - name: Install dependencies
        run: |-
          uv venv
          uv pip install .[dev]

      - name: Pre-seed sandbox tools -dev binary (CI stopgap)
        # The `edited` install-state triggers a `-dev`-suffixed binary lookup
        # that isn't published to S3 by design. Download the published non-dev
        # v{N} and save it under the `-dev` name so the local-binary check in
        # `_open_executable_for_arch` short-circuits before the interactive
        # build prompt. Remove once the install-state logic is fixed.
        run: |
          VERSION=$(cat src/inspect_ai/tool/_sandbox_tools_utils/sandbox_tools_version.txt)
          ARCH=amd64  # ubuntu-latest runner
          mkdir -p src/inspect_ai/binaries
          curl -fSL \
            -o "src/inspect_ai/binaries/inspect-sandbox-tools-${ARCH}-v${VERSION}-dev" \
            "https://inspect-sandbox-tools.s3.us-east-2.amazonaws.com/inspect-sandbox-tools-${ARCH}-v${VERSION}"
          chmod +x "src/inspect_ai/binaries/inspect-sandbox-tools-${ARCH}-v${VERSION}-dev"

      - name: Run slow tool tests
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: uv run pytest --runslow -m slow tests/tools/ -x

      - name: Minimize uv cache
        if: ${{ !cancelled() }}
        run: uv cache prune --ci

  package:
    name: Build & inspect the package.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: hynek/build-and-inspect-python-package@v2
