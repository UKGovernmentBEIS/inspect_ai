name: Validate Embedded Viewer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

# Cancel superseded in-flight runs when a PR branch is updated; runs on
# main queue rather than cancel so every merge commit gets a full build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  UV_VERSION: 0.9.4

jobs:
  check-schema-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          version: "${{ env.UV_VERSION }}"

      - name: Install Python dependencies
        run: uv pip install --system .[dev]

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: src/inspect_ai/_view/ts-mono/package.json
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: pnpm
          cache-dependency-path: src/inspect_ai/_view/ts-mono/pnpm-lock.yaml
      - name: Install Node.js dependencies
        working-directory: src/inspect_ai/_view/ts-mono
        run: pnpm install --frozen-lockfile

      # The pipeline is Python → inspect-openapi.json → generated.ts. The two
      # arrows are checked independently: json → ts must match exactly, while
      # Python → json tolerates docstring-only ("description") drift so that
      # doc changes don't require regenerating checked-in artifacts. As a
      # result, description text in the committed artifacts can lag the Python
      # docstrings until the next structural change forces a regeneration.

      - name: Check generated types are in sync with checked-in schema
        working-directory: src/inspect_ai/_view/ts-mono
        run: |
          pnpm --filter @tsmono/inspect-common types:generate
          if ! git diff --exit-code -- packages/inspect-common/src/types/generated.ts
          then
            echo "generated.ts is out of sync with the committed inspect-openapi.json."
            echo "Regenerate both artifacts and commit them:"
            echo "  python src/inspect_ai/_view/schema.py"
            exit 1
          fi

      - name: Regenerate schema from Python source
        run: python src/inspect_ai/_view/schema.py

      - name: Check schema is up to date (docstring-only drift tolerated)
        run: python .github/scripts/check_openapi_drift.py

      - name: Ensure regeneration produced no other changes
        run: |
          if git status --porcelain \
              | grep -vE 'src/inspect_ai/_view/(inspect-openapi\.json|ts-mono)$' \
              | grep -q . \
            || git -C src/inspect_ai/_view/ts-mono status --porcelain \
              | grep -v 'packages/inspect-common/src/types/generated\.ts$' \
              | grep -q .
          then
            echo "Unexpected changes after regeneration:"
            git status
            git diff -- . ':!src/inspect_ai/_view/inspect-openapi.json'
            git -C src/inspect_ai/_view/ts-mono status
            git -C src/inspect_ai/_view/ts-mono diff -- . ':!packages/inspect-common/src/types/generated.ts'
            exit 1
          fi

  submodule-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify submodule commit is on ts-mono main
        run: |
          SUBMODULE_SHA=$(git ls-tree HEAD src/inspect_ai/_view/ts-mono | awk '{print $3}')
          echo "Submodule points to: $SUBMODULE_SHA"

          git fetch https://github.com/meridianlabs-ai/ts-mono.git main
          MAIN_SHA=$(git rev-parse FETCH_HEAD)
          echo "ts-mono main is at: $MAIN_SHA"

          if git merge-base --is-ancestor "$SUBMODULE_SHA" "$MAIN_SHA"; then
            echo "✓ Submodule commit is on ts-mono main"
          else
            echo "✗ Submodule commit $SUBMODULE_SHA is not on ts-mono main."
            echo "  Merge the submodule PR first, then update the pointer."
            exit 1
          fi

  dist-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: src/inspect_ai/_view/ts-mono/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: pnpm
          cache-dependency-path: src/inspect_ai/_view/ts-mono/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/inspect_ai/_view/ts-mono
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: src/inspect_ai/_view/ts-mono
        run: pnpm --filter @meridianlabs/log-viewer build

      - name: Check dist is up-to-date
        run: |
          if ! git diff --exit-code src/inspect_ai/_view/dist
          then
            echo "❌ dist/ is out of sync with the frontend source!"
            echo ""
            echo "The build output has changed. Run:"
            echo "  cd src/inspect_ai/_view/ts-mono"
            echo "  pnpm --filter @meridianlabs/log-viewer build"
            echo ""
            echo "Then commit the updated dist/ directory."
            exit 1
          fi
