name: Sync Model Data

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UV_VERSION: 0.9.4

jobs:
  sync-models:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.11"

      # The script is self-contained (no inspect_ai imports), so run the file
      # directly with just its two dependencies rather than installing the
      # whole package.
      - name: Sync model data
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: |
          uv run --no-project --with requests --with pyyaml \
            python src/inspect_ai/model/_model_data/sync_models.py

      # The generated header embeds a run timestamp, so the file is dirty
      # after every run even when no model data changed; revert in that case
      # so no PR is opened.
      - name: Revert timestamp-only changes
        run: |
          FILE=src/inspect_ai/model/_model_data/together.yml
          if git diff -I '^# Auto-generated by sync_models.py' --quiet -- "$FILE"; then
            git checkout -- "$FILE"
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: src/inspect_ai/model/_model_data/together.yml
          branch: sync-model-data
          delete-branch: true
          commit-message: Update model data from the TogetherAI API
          title: Update model data from the TogetherAI API
          body: |
            Automated update of `src/inspect_ai/model/_model_data/together.yml`
            generated by `src/inspect_ai/model/_model_data/sync_models.py`.

            Opened by the [Sync Model Data workflow](https://github.com/${{ github.repository }}/actions/workflows/sync_model_data.yml).